; Standalone Wi-Fi control proof-of-life for Waveshare ESP32-P4-WIFI6.
; This follows the known-good Examples/WIFI/WIFI_Example PlatformIO setup,
; then adds a small browser UI/API for logger commands.

[env:esp32-p4]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-p4
framework = espidf
monitor_speed = 115200
monitor_filters = send_on_enter
