; Each stable node owns its sensor configuration at compile time.

[node_base]
platform = espressif32
board = esp32-c3-devkitm-1
monitor_speed = 115200
board_build.mcu = esp32c3
board_upload.flash_size = 2MB
framework = espidf
build_flags =
    -D NODE_CAN_TX_GPIO=21
    -D NODE_CAN_RX_GPIO=20

; SENSOR_SERIAL_TEST=0 uses normal CAN operation.
; Set it to 1 to skip CAN, start immediately, and print sensor readings.

[env:NodeBrake]
extends = node_base
build_flags =
    ${node_base.build_flags}
    -D NODE_ID=1
    -D NODE_FIXED_BRAKE_CONFIG=1
    -D NODE_FIXED_ENCODER_CONFIG=0
    -D NODE_FIXED_ENGINE_CONFIG=0
    -D NODE_FIXED_ADC_CONFIG=0
    -D SENSOR_SERIAL_TEST=0

[env:NodeEncoder]
extends = node_base
build_flags =
    ${node_base.build_flags}
    -D NODE_ID=4
    -D NODE_FIXED_BRAKE_CONFIG=0
    -D NODE_FIXED_ENCODER_CONFIG=1
    -D NODE_FIXED_ENGINE_CONFIG=0
    -D NODE_FIXED_ADC_CONFIG=0
    -D SENSOR_SERIAL_TEST=0

[env:NodeEngine]
extends = node_base
build_flags =
    ${node_base.build_flags}
    -D NODE_ID=5
    -D NODE_FIXED_BRAKE_CONFIG=0
    -D NODE_FIXED_ENCODER_CONFIG=0
    -D NODE_FIXED_ENGINE_CONFIG=1
    -D NODE_FIXED_ADC_CONFIG=0
    -D SENSOR_SERIAL_TEST=0

[env:NodeADC]
extends = node_base
build_flags =
    ${node_base.build_flags}
    -D NODE_ID=6
    -D NODE_FIXED_BRAKE_CONFIG=0
    -D NODE_FIXED_ENCODER_CONFIG=0
    -D NODE_FIXED_ENGINE_CONFIG=0
    -D NODE_FIXED_ADC_CONFIG=1
    -D SENSOR_SERIAL_TEST=0

[env:NodeEngineBench]
extends = node_base
build_flags =
    ${node_base.build_flags}
    -D NODE_ID=5
    -D NODE_FIXED_BRAKE_CONFIG=0
    -D NODE_FIXED_ENCODER_CONFIG=0
    -D NODE_FIXED_ENGINE_CONFIG=1
    -D NODE_FIXED_ADC_CONFIG=0
    -D SENSOR_SERIAL_TEST=1
