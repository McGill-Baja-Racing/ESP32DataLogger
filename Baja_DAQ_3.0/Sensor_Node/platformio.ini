; Stable Sensor Node firmware environments

[node_base]
platform = espressif32
board = esp32-c3-devkitm-1
monitor_speed = 115200
board_build.mcu = esp32c3
framework = espidf
build_flags =
    -D NODE_ID=4
    -D NODE_CAN_TX_GPIO=21
    -D NODE_CAN_RX_GPIO=20
    -D NODE_START_ACTIVE_ON_BOOT=0
    -D NODE_DEFAULT_SENSORS_ENABLED=0
    -D NODE_ENABLE_SIM_FUNCTION=1
    -D NODE_ENABLE_ADC_FUNCTIONS=0
    -D NODE_ENABLE_RPM_FUNCTION=0
    -D NODE_ENABLE_BEARING_FUNCTION=0

[env:NodeStable]
extends = node_base

[env:NodeStableSim]
extends = node_base
build_flags =
    -D NODE_ID=4
    -D NODE_CAN_TX_GPIO=21
    -D NODE_CAN_RX_GPIO=20
    -D NODE_START_ACTIVE_ON_BOOT=0
    -D NODE_DEFAULT_SENSORS_ENABLED=1
    -D NODE_ENABLE_SIM_FUNCTION=1
    -D NODE_ENABLE_ADC_FUNCTIONS=0
    -D NODE_ENABLE_RPM_FUNCTION=0
    -D NODE_ENABLE_BEARING_FUNCTION=0

[env:NodeStableRPM]
extends = node_base
build_flags =
    -D NODE_ID=4
    -D NODE_CAN_TX_GPIO=21
    -D NODE_CAN_RX_GPIO=20
    -D NODE_START_ACTIVE_ON_BOOT=0
    -D NODE_DEFAULT_SENSORS_ENABLED=0
    -D NODE_ENABLE_SIM_FUNCTION=1
    -D NODE_ENABLE_ADC_FUNCTIONS=0
    -D NODE_ENABLE_RPM_FUNCTION=1
    -D NODE_ENABLE_BEARING_FUNCTION=0
    -D NODE_SERIAL_TEST_RPM_GPIO=3

[env:NodeStableADC]
extends = node_base
build_flags =
    -D NODE_ID=4
    -D NODE_CAN_TX_GPIO=21
    -D NODE_CAN_RX_GPIO=20
    -D NODE_START_ACTIVE_ON_BOOT=0
    -D NODE_DEFAULT_SENSORS_ENABLED=0
    -D NODE_ENABLE_SIM_FUNCTION=1
    -D NODE_ENABLE_ADC_FUNCTIONS=1
    -D NODE_ENABLE_RPM_FUNCTION=0
    -D NODE_ENABLE_BEARING_FUNCTION=0

[env:NodeEncoderTest]
extends = node_base
build_flags =
    -D NODE_ID=4
    -D NODE_CAN_TX_GPIO=4
    -D NODE_CAN_RX_GPIO=5
    -D NODE_START_ACTIVE_ON_BOOT=1
    -D NODE_DEFAULT_SENSORS_ENABLED=1
    -D NODE_ENABLE_SIM_FUNCTION=1
    -D NODE_ENABLE_ADC_FUNCTIONS=0
    -D NODE_ENABLE_RPM_FUNCTION=0
    -D NODE_ENABLE_BEARING_FUNCTION=1
    -D NODE_ENCODER_TEST_ONLY=1
    -D NODE_SERIAL_DEBUG_SAMPLES=1
    -D NODE_SERIAL_TEST_ENCODER_GPIO_A=6
    -D NODE_SERIAL_TEST_ENCODER_GPIO_B=7
