; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:Master]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-p4
framework = espidf
monitor_speed = 115200
monitor_filters = send_on_enter
board_build.partitions = partitions.csv

board_build.esp-idf.components =
    fatfs
    sdmmc
    esp_driver_sdmmc
    json

[env:MasterStable]
extends = env:Master
board_build.cmake_extra_args =
    -DMASTER_GPS_ENABLED=0
    -DMASTER_RPM_ENABLED=0
build_flags =
    -DMASTER_USE_SD_NODE_CONFIG=0
    -DMASTER_AUTO_START_LOGGING=1
    -DMASTER_GPS_ENABLED=0
    -DMASTER_RPM_ENABLED=0

[env:MasterStableGPS]
extends = env:MasterStable
board_build.cmake_extra_args =
    -DMASTER_GPS_ENABLED=1
    -DMASTER_RPM_ENABLED=0
build_flags =
    -DMASTER_USE_SD_NODE_CONFIG=0
    -DMASTER_AUTO_START_LOGGING=1
    -DMASTER_GPS_ENABLED=1
    -DMASTER_RPM_ENABLED=0

[env:MasterStableRPM]
extends = env:MasterStable
board_build.cmake_extra_args =
    -DMASTER_GPS_ENABLED=0
    -DMASTER_RPM_ENABLED=1
build_flags =
    -DMASTER_USE_SD_NODE_CONFIG=0
    -DMASTER_AUTO_START_LOGGING=1
    -DMASTER_GPS_ENABLED=0
    -DMASTER_RPM_ENABLED=1

[env:MasterStableSensors]
extends = env:MasterStable
board_build.cmake_extra_args =
    -DMASTER_GPS_ENABLED=1
    -DMASTER_RPM_ENABLED=1
build_flags =
    -DMASTER_USE_SD_NODE_CONFIG=0
    -DMASTER_AUTO_START_LOGGING=1
    -DMASTER_GPS_ENABLED=1
    -DMASTER_RPM_ENABLED=1
